<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Reset your NOVA account password.">
  <meta name="theme-color" content="#0F172A">
  <title>Reset password — NOVA</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="responsive.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%236366F1'/%3E%3Cpath d='M20 44V20l24 24V20' stroke='white' stroke-width='6' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">

  <script src="theme.js"></script>
</head>
<body>
  <div class="orbs" aria-hidden="true">
    <span class="orb orb-1"></span><span class="orb orb-2"></span><span class="orb orb-3"></span>
  </div>

  <div class="auth-page">
    <main class="auth-main">
      <button class="icon-btn bordered auth-theme-btn" data-action="toggle-theme" aria-label="Toggle theme">
        <svg class="ic" aria-hidden="true"><use href="#i-sun"></use></svg>
      </button>

      <div class="auth-card">
        <a class="auth-logo" href="../index.html">
          <span class="logo-mark"><svg class="ic ic-lg" aria-hidden="true"><use href="#i-zap"></use></svg></span>
          NOVA
        </a>

        <header class="auth-head">
          <h1>Forgot your password?</h1>
          <p>No worries — enter your email and we’ll send you a secure reset link.</p>
        </header>

        <form class="auth-form" id="forgotForm" novalidate>
          <div class="field">
            <label for="forgotEmail">Email address</label>
            <div class="input-wrap">
              <svg class="ic" aria-hidden="true"><use href="#i-mail"></use></svg>
              <input class="input" id="forgotEmail" type="email" autocomplete="email" placeholder="you@company.com" required>
            </div>
            <span class="field-error"><svg class="ic ic-sm" aria-hidden="true"><use href="#i-alert"></use></svg> Please enter a valid email address</span>
          </div>

          <button type="submit" class="btn btn-primary btn-lg btn-block">
            <svg class="ic" aria-hidden="true"><use href="#i-send"></use></svg>
            Send reset link
          </button>
        </form>

        <!-- Success state -->
        <div class="empty-state hidden" id="forgotSuccess">
          <span class="es-icon" style="background:rgba(16,185,129,.14);color:var(--success)">
            <svg class="ic ic-xl" aria-hidden="true"><use href="#i-mail"></use></svg>
          </span>
          <h3>Check your inbox 📬</h3>
          <p>We sent a password reset link to <strong id="sentTo">you@company.com</strong>. The link expires in 30 minutes.</p>
          <button class="btn btn-secondary btn-sm" onclick="location.reload()">
            <svg class="ic ic-sm" aria-hidden="true"><use href="#i-refresh"></use></svg>
            Use a different email
          </button>
        </div>

        <p class="auth-foot">
          <a href="../index.html" class="flex items-center gap-xs" style="display:inline-flex">
            <svg class="ic ic-sm" aria-hidden="true"><use href="#i-arrow-left"></use></svg>
            Back to sign in
          </a>
        </p>
      </div>
    </main>
  </div>

  <script src="icons.js"></script>
  <script src="app.js"></script>
  <script src="auth.js"></script>
</body>
</html>
